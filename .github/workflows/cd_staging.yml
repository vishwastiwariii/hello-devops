name: Deploy to staging (main)

on:
  push: 
    branches:
      - "main"

jobs:
  redeploy_everything: 
    runs-on: ubuntu-latest
    name: Deploying everything to the staging cluster
    steps: 
      - name: SSH Into Server and Deploy
        run: |
          # 1. Create the .ssh directory if it does not exist
          mkdir -p ~/.ssh
          
          # 2. Write the private key and secure its permissions (CRITICAL)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. Disable strict host checking so the script does not hang on the "Are you sure you want to continue connecting?" prompt
          ssh-keyscan -H 3.110.212.91 >> ~/.ssh/known_hosts
          
          # 4. Execute the deployment commands on the remote EC2 instance using a single SSH command string
          ssh -i ~/.ssh/id_rsa ubuntu@3.110.212.91 "
            cd hello-devops && \
            git pull && \
            pnpm install && \
            pnpm run build && \
            pm2 restart http-server && \
            pm2 restart ws-server && \
            pm2 restart fe-server
          "
